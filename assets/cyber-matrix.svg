  <style>
    .t{font-family:'Fira Code',monospace;font-size:16px;fill:#22c55e;opacity:.75}.h{font-family:Inter,Arial,sans-serif;font-size:32px;font-weight:900;fill:#f8fafc}.s{font-family:'Fira Code',monospace;font-size:17px;fill:#67e8f9}.col{animation:fall 6s linear infinite}.c2{animation-delay:-1s}.c3{animation-delay:-2s}.c4{animation-delay:-3s}.c5{animation-delay:-4s}.c6{animation-delay:-5s}@keyframes fall{from{transform:translateY(-190px);opacity:.15}20%{opacity:.9}to{transform:translateY(240px);opacity:.05}}
