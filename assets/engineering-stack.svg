    <style>.title{font:800 30px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.sub{font:600 12px 'Segoe UI',Arial,sans-serif;fill:#94a3b8;letter-spacing:.2px}.head{font:800 17px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}.label{font:800 14px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.note{font:700 11px 'Segoe UI',Arial,sans-serif;fill:#93c5fd}.chip{font:800 10.5px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb;letter-spacing:.45px}.chip2{font:800 9.8px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb;letter-spacing:.35px}.tiny{font:700 10px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}.pct{font:900 11px 'Segoe UI',Arial,sans-serif;fill:#67e8f9}.bar{transform-origin:left center;animation:grow 1.7s ease-out both}.dash{stroke-dasharray:8 11;animation:dash 9s linear infinite}.flow{stroke-dasharray:20 24;animation:flow 3.6s linear infinite}.pulse{animation:pulse 2.4s ease-in-out infinite}.float{animation:float 4.6s ease-in-out infinite}@keyframes grow{from{transform:scaleX(.2);opacity:.35}to{transform:scaleX(1);opacity:1}}@keyframes dash{to{stroke-dashoffset:-180}}@keyframes flow{to{stroke-dashoffset:-180}}@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}</style>
