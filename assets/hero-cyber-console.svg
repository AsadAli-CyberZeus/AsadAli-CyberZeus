<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Asad Ali cyber systems hero banner">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#07112a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.55"/>
    </pattern>
    <style>
      .mono { font-family: 'Fira Code', 'SFMono-Regular', Consolas, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      @keyframes scan { 0% { transform: translateY(-120px); opacity: .15; } 50% { opacity:.55; } 100% { transform: translateY(420px); opacity: .05; } }
      @keyframes blink { 0%,45% {opacity:1} 46%,100% {opacity:0} }
      @keyframes pulse { 0%,100% { opacity:.25; r:3 } 50% { opacity:1; r:6 } }
      @keyframes dash { from { stroke-dashoffset: 640; } to { stroke-dashoffset: 0; } }
      @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      #scanline { animation: scan 4.6s linear infinite; }
      .node { animation: pulse 2.2s ease-in-out infinite; }
      .node2 { animation-delay:.55s; }
      .node3 { animation-delay:1.1s; }
      .trace { stroke-dasharray: 9 14; animation: dash 12s linear infinite; }
      .float { animation: float 4s ease-in-out infinite; transform-box: fill-box; transform-origin:center; }
      .cursor { animation: blink .9s infinite; }
    </style>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)" rx="28"/>
  <rect width="1200" height="360" fill="url(#grid)" rx="28" opacity="0.7"/>
  <rect id="scanline" x="0" y="0" width="1200" height="80" fill="url(#neon)" opacity="0.13"/>
  <path class="trace" d="M60 275 C190 180 260 320 385 210 S620 115 735 210 960 320 1135 125" fill="none" stroke="url(#neon)" stroke-width="2" opacity=".7" filter="url(#glow)"/>
  <g class="float">
    <rect x="68" y="58" width="350" height="216" rx="18" fill="#020617" stroke="#334155"/>
    <circle cx="96" cy="86" r="6" fill="#ef4444"/>
    <circle cx="118" cy="86" r="6" fill="#f59e0b"/>
    <circle cx="140" cy="86" r="6" fill="#10b981"/>
    <text x="96" y="127" class="mono" font-size="18" fill="#67e8f9">$ whoami</text>
    <text x="96" y="158" class="mono" font-size="18" fill="#e2e8f0">Asad Ali</text>
    <text x="96" y="191" class="mono" font-size="18" fill="#67e8f9">$ mission</text>
    <text x="96" y="222" class="mono" font-size="16" fill="#c4b5fd">secure • intelligent • distributed</text>
    <text x="96" y="252" class="mono cursor" font-size="18" fill="#22c55e">█</text>
  </g>
  <text x="470" y="96" class="sans" font-size="54" font-weight="800" fill="#f8fafc">Asad Ali</text>
  <text x="470" y="140" class="mono" font-size="22" fill="#67e8f9">Security Software Engineer • Rust Systems • AI x Blockchain</text>
  <text x="470" y="183" class="sans" font-size="18" fill="#cbd5e1">Building zero-trust platforms, AI security automation, distributed infrastructure,</text>
  <text x="470" y="212" class="sans" font-size="18" fill="#cbd5e1">and production-grade Web3/security systems.</text>
  <g filter="url(#glow)">
    <circle class="node" cx="520" cy="282" r="4" fill="#22d3ee"/>
    <circle class="node node2" cx="650" cy="282" r="4" fill="#8b5cf6"/>
    <circle class="node node3" cx="805" cy="282" r="4" fill="#10b981"/>
    <circle class="node node2" cx="980" cy="282" r="4" fill="#f59e0b"/>
  </g>
  <g class="mono" font-size="14" fill="#e2e8f0">
    <text x="545" y="287">Zero Trust</text>
    <text x="675" y="287">Rust Infra</text>
    <text x="830" y="287">AI Security</text>
    <text x="1005" y="287">Web3</text>
  </g>
</svg>