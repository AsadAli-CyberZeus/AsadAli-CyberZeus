<svg width="1100" height="610" viewBox="0 0 1100 610" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Engineering Capability Map</title>
  <desc id="desc">A concise animated map of engineering skills: Rust, Python, Solidity, C++, Dart Flutter, backend systems, DevOps, security, AI, and Web3.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.48" stop-color="#071426"/>
      <stop offset="1" stop-color="#0A1027"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font:700 34px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC;letter-spacing:.2px}
      .sub{font:500 14px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}
      .h{font:800 17px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC;letter-spacing:.4px}
      .small{font:600 12px Inter,Segoe UI,Arial,sans-serif;fill:#CBD5E1;letter-spacing:.25px}
      .mini{font:600 11px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}
      .skill{font:700 13px Inter,Segoe UI,Arial,sans-serif;fill:#E2E8F0}
      .tag{font:700 12px Inter,Segoe UI,Arial,sans-serif;fill:#DDEBFF;letter-spacing:.4px}
      .tag2{font:600 11px Inter,Segoe UI,Arial,sans-serif;fill:#94A3B8}
      .pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}
      .float{animation:float 5s ease-in-out infinite;transform-origin:center}
      .float2{animation:float 6s ease-in-out infinite reverse;transform-origin:center}
      .dash{stroke-dasharray:10 12;animation:dash 12s linear infinite}
      .scan{animation:scan 6s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.035)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes dash{to{stroke-dashoffset:-220}}
      @keyframes scan{0%,100%{transform:translateX(-120px);opacity:.05}50%{transform:translateX(930px);opacity:.18}}
    </style>
  </defs>

  <rect width="1100" height="610" rx="32" fill="url(#bg)"/>
  <rect x="18" y="18" width="1064" height="574" rx="28" fill="#0B1220" fill-opacity="0.78" stroke="#334155" stroke-width="1.4"/>
  <circle cx="940" cy="88" r="155" fill="#0EA5E9" opacity="0.10" filter="url(#glow)"/>
  <circle cx="122" cy="520" r="125" fill="#22C55E" opacity="0.06" filter="url(#glow)"/>
  <rect class="scan" x="70" y="28" width="160" height="554" rx="80" fill="#22D3EE" opacity="0.07"/>

  <text x="56" y="64" class="title">Engineering Capability Map</text>
  <text x="56" y="91" class="sub">Concise stack based on real resume experience.</text>
  <path class="dash" d="M118 112 C270 64, 455 94, 612 75 C770 55, 900 70, 1032 116" stroke="#38BDF8" stroke-opacity=".38" stroke-width="2"/>

  <!-- Left panel: core languages -->
  <g filter="url(#soft)">
    <rect x="55" y="126" width="420" height="340" rx="22" fill="#0F172A" stroke="#2563EB" stroke-opacity=".65"/>
    <text x="82" y="164" class="h">Core Languages</text>
    <text x="82" y="187" class="mini">Primary engineering stack</text>

    <g transform="translate(82,215)">
      <text x="0" y="0" class="skill">Rust</text><text x="360" y="0" class="tag" fill="#22D3EE" text-anchor="end">CORE</text>
      <rect x="0" y="13" width="350" height="11" rx="5.5" fill="#1E293B"/><rect x="0" y="13" width="330" height="11" rx="5.5" fill="url(#orange)"><animate attributeName="width" values="0;330" dur="1.2s" fill="freeze"/></rect>
    </g>
    <g transform="translate(82,267)">
      <text x="0" y="0" class="skill">Python</text><text x="360" y="0" class="tag" fill="#22D3EE" text-anchor="end">STRONG</text>
      <rect x="0" y="13" width="350" height="11" rx="5.5" fill="#1E293B"/><rect x="0" y="13" width="300" height="11" rx="5.5" fill="url(#cyan)"><animate attributeName="width" values="0;300" dur="1.3s" fill="freeze"/></rect>
    </g>
    <g transform="translate(82,319)">
      <text x="0" y="0" class="skill">Solidity</text><text x="360" y="0" class="tag" fill="#22D3EE" text-anchor="end">STRONG</text>
      <rect x="0" y="13" width="350" height="11" rx="5.5" fill="#1E293B"/><rect x="0" y="13" width="286" height="11" rx="5.5" fill="url(#violet)"><animate attributeName="width" values="0;286" dur="1.4s" fill="freeze"/></rect>
    </g>
    <g transform="translate(82,371)">
      <text x="0" y="0" class="skill">C++</text><text x="360" y="0" class="tag" fill="#22D3EE" text-anchor="end">WORKING</text>
      <rect x="0" y="13" width="350" height="11" rx="5.5" fill="#1E293B"/><rect x="0" y="13" width="250" height="11" rx="5.5" fill="#60A5FA"><animate attributeName="width" values="0;250" dur="1.5s" fill="freeze"/></rect>
    </g>
    <g transform="translate(82,423)">
      <text x="0" y="0" class="skill">Dart / Flutter</text><text x="360" y="0" class="tag" fill="#22D3EE" text-anchor="end">PRODUCT</text>
      <rect x="0" y="13" width="350" height="11" rx="5.5" fill="#1E293B"/><rect x="0" y="13" width="240" height="11" rx="5.5" fill="#38BDF8"><animate attributeName="width" values="0;240" dur="1.6s" fill="freeze"/></rect>
    </g>
  </g>

  <!-- Right panel: capability modules -->
  <g filter="url(#soft)">
    <rect x="505" y="126" width="540" height="340" rx="22" fill="#0F172A" stroke="#334155" stroke-width="1.2"/>
    <text x="532" y="164" class="h">Applied Engineering Areas</text>
    <text x="532" y="187" class="mini">Grouped for clarity across practical engineering areas.</text>

    <circle cx="776" cy="320" r="100" fill="#0B1220" stroke="#1D4ED8" stroke-opacity=".45"/>
    <circle cx="776" cy="320" r="66" fill="none" stroke="#334155" stroke-opacity=".65"/>
    <circle cx="776" cy="320" r="34" fill="none" stroke="#334155" stroke-opacity=".7"/>
    <path d="M776 220 L862 292 L832 405 L720 395 L684 292 Z" fill="#2563EB" fill-opacity=".14" stroke="#60A5FA" stroke-opacity=".42"/>
    <line x1="776" y1="216" x2="776" y2="424" stroke="#334155"/><line x1="674" y1="320" x2="878" y2="320" stroke="#334155"/><line x1="704" y1="248" x2="848" y2="392" stroke="#334155"/><line x1="848" y1="248" x2="704" y2="392" stroke="#334155"/>
    <circle class="pulse" cx="776" cy="320" r="18" fill="#0EA5E9" fill-opacity=".32" stroke="#22D3EE"/>
    <circle class="pulse" cx="776" cy="320" r="5" fill="#67E8F9"/>

    <g class="float">
      <rect x="535" y="214" width="180" height="62" rx="14" fill="#102033" stroke="#22D3EE" stroke-opacity=".75"/>
      <text x="553" y="242" class="tag">BACKEND</text><text x="553" y="263" class="tag2">REST · gRPC · reliability</text>
    </g>
    <g class="float2">
      <rect x="836" y="214" width="166" height="62" rx="14" fill="#15172C" stroke="#8B5CF6" stroke-opacity=".75"/>
      <text x="854" y="242" class="tag">AI SYSTEMS</text><text x="854" y="263" class="tag2">LLM eval · risk scoring</text>
    </g>
    <g class="float">
      <rect x="535" y="312" width="180" height="62" rx="14" fill="#1B1420" stroke="#EF4444" stroke-opacity=".75"/>
      <text x="553" y="340" class="tag">SECURITY</text><text x="553" y="361" class="tag2">VAPT · threat modeling</text>
    </g>
    <g class="float2">
      <rect x="836" y="312" width="166" height="62" rx="14" fill="#1A1720" stroke="#F59E0B" stroke-opacity=".75"/>
      <text x="854" y="340" class="tag">WEB3</text><text x="854" y="361" class="tag2">EVM · DeFi · dApps</text>
    </g>
    <g class="float">
      <rect x="535" y="410" width="180" height="62" rx="14" fill="#11211F" stroke="#10B981" stroke-opacity=".75"/>
      <text x="553" y="438" class="tag">DEVOPS</text><text x="553" y="459" class="tag2">Linux · Docker · CI/CD</text>
    </g>
    <g class="float2">
      <rect x="836" y="410" width="166" height="62" rx="14" fill="#111D2F" stroke="#60A5FA" stroke-opacity=".75"/>
      <text x="854" y="438" class="tag">PRODUCT</text><text x="854" y="459" class="tag2">Flutter · dashboards</text>
    </g>
  </g>

  <!-- Bottom concise tags -->
  <g transform="translate(56,508)">
    <text x="0" y="0" class="h">Stack Signals</text>
    <g transform="translate(0,25)">
      <rect x="0" y="0" width="145" height="30" rx="15" fill="#0F172A" stroke="#22D3EE" stroke-opacity=".55"/><text x="72" y="20" text-anchor="middle" class="small">Rust Backend</text>
      <rect x="158" y="0" width="126" height="30" rx="15" fill="#0F172A" stroke="#38BDF8" stroke-opacity=".55"/><text x="221" y="20" text-anchor="middle" class="small">Python AI</text>
      <rect x="297" y="0" width="128" height="30" rx="15" fill="#0F172A" stroke="#8B5CF6" stroke-opacity=".55"/><text x="361" y="20" text-anchor="middle" class="small">Solidity</text>
      <rect x="438" y="0" width="150" height="30" rx="15" fill="#0F172A" stroke="#EF4444" stroke-opacity=".55"/><text x="513" y="20" text-anchor="middle" class="small">Cybersecurity</text>
      <rect x="601" y="0" width="148" height="30" rx="15" fill="#0F172A" stroke="#10B981" stroke-opacity=".55"/><text x="675" y="20" text-anchor="middle" class="small">DevOps</text>
      <rect x="762" y="0" width="148" height="30" rx="15" fill="#0F172A" stroke="#F59E0B" stroke-opacity=".55"/><text x="836" y="20" text-anchor="middle" class="small">Web3 Systems</text>
      <rect x="923" y="0" width="120" height="30" rx="15" fill="#0F172A" stroke="#60A5FA" stroke-opacity=".55"/><text x="983" y="20" text-anchor="middle" class="small">Flutter UI</text>
    </g>
  </g>

  <g transform="translate(56,578)">
    <circle cx="0" cy="0" r="4" fill="#22D3EE"/><text x="14" y="4" class="mini">Build</text>
    <circle cx="122" cy="0" r="4" fill="#8B5CF6"/><text x="136" y="4" class="mini">Automate</text>
    <circle cx="258" cy="0" r="4" fill="#10B981"/><text x="272" y="4" class="mini">Secure</text>
    <circle cx="380" cy="0" r="4" fill="#F59E0B"/><text x="394" y="4" class="mini">Ship</text>
  </g>
</svg>
