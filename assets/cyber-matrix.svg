  <text class="t col c5" x="780" y="90">solidity evm audit mesh</text>
  <text class="t col c6" x="950" y="20">grpc docker k8s</text>
</g>
<rect x="120" y="70" width="860" height="120" rx="22" fill="#020617" opacity=".86" stroke="#14532d"/>
<text class="h" x="550" y="122" text-anchor="middle">Cybersecurity × Rust Systems × AI × Blockchain</text>
